<!DOCTYPE html>
<html lang="en">
<head>

<title>For Ifla 💍</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<audio id="music" loop>

</audio>

    <div id="poem"></div>

<script src="script.js"></script>

</html>
